<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560" width="800" height="560" font-family="Segoe UI, system-ui, sans-serif">
  <!-- Background -->
  <rect width="800" height="560" fill="#0f172a" rx="12"/>
  <!-- Title -->
  <text x="400" y="36" fill="#e2e8f0" font-size="18" font-weight="bold" text-anchor="middle">ByClan Web — 인증 흐름 (Auth Flow)</text>

  <!-- Node styles: rounded rects -->
  <!-- Start -->
  <rect x="330" y="60" width="140" height="40" rx="20" fill="#4f46e5"/>
  <text x="400" y="85" fill="#fff" font-size="13" text-anchor="middle">브라우저 진입 /</text>

  <!-- Arrow 1 -->
  <line x1="400" y1="100" x2="400" y2="120" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- HomeGate -->
  <rect x="300" y="120" width="200" height="44" rx="8" fill="#1e293b" stroke="#6366f1" stroke-width="1.5"/>
  <text x="400" y="138" fill="#e2e8f0" font-size="13" text-anchor="middle">HomeGate</text>
  <text x="400" y="155" fill="#94a3b8" font-size="11" text-anchor="middle">비밀번호 확인</text>

  <!-- Arrow to login -->
  <line x1="400" y1="164" x2="400" y2="190" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Login -->
  <rect x="310" y="190" width="180" height="44" rx="8" fill="#1e293b" stroke="#6366f1" stroke-width="1.5"/>
  <text x="400" y="208" fill="#e2e8f0" font-size="13" text-anchor="middle">/login</text>
  <text x="400" y="225" fill="#94a3b8" font-size="11" text-anchor="middle">Discord OAuth 요청</text>

  <!-- Arrow to callback -->
  <line x1="400" y1="234" x2="400" y2="260" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Callback -->
  <rect x="290" y="260" width="220" height="44" rx="8" fill="#1e293b" stroke="#6366f1" stroke-width="1.5"/>
  <text x="400" y="278" fill="#e2e8f0" font-size="13" text-anchor="middle">/auth/callback</text>
  <text x="400" y="295" fill="#94a3b8" font-size="11" text-anchor="middle">PKCE 코드 교환</text>

  <!-- Arrow to session -->
  <line x1="400" y1="304" x2="400" y2="330" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Supabase session -->
  <rect x="295" y="330" width="210" height="44" rx="8" fill="#0284c7"/>
  <text x="400" y="348" fill="#fff" font-size="13" text-anchor="middle">Supabase 세션 생성</text>
  <text x="400" y="365" fill="#bae6fd" font-size="11" text-anchor="middle">getSession + profiles 조회</text>

  <!-- Arrow to permissions -->
  <line x1="400" y1="374" x2="400" y2="400" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- getPermissions -->
  <rect x="300" y="400" width="200" height="44" rx="8" fill="#1e293b" stroke="#6366f1" stroke-width="1.5"/>
  <text x="400" y="418" fill="#e2e8f0" font-size="13" text-anchor="middle">getPermissions()</text>
  <text x="400" y="435" fill="#94a3b8" font-size="11" text-anchor="middle">역할별 권한 계산</text>

  <!-- Arrow to render -->
  <line x1="400" y1="444" x2="400" y2="470" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Final render -->
  <rect x="310" y="470" width="180" height="40" rx="20" fill="#16a34a"/>
  <text x="400" y="495" fill="#fff" font-size="13" text-anchor="middle">✅ 페이지 렌더링 완료</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Footer -->
  <text x="400" y="545" fill="#475569" font-size="11" text-anchor="middle">ByClan Web · Auth Flow · docs/diagram-gallery/auth-flow.svg</text>
</svg>
