<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 560" width="820" height="560" font-family="Segoe UI, system-ui, sans-serif">
  <rect width="820" height="560" fill="#0f172a" rx="12"/>
  <text x="410" y="36" fill="#e2e8f0" font-size="18" font-weight="bold" text-anchor="middle">ByClan Web — 역할 계층 (Role Hierarchy)</text>

  <!-- Root -->
  <rect x="300" y="55" width="220" height="44" rx="8" fill="#4f46e5"/>
  <text x="410" y="73" fill="#fff" font-size="13" text-anchor="middle" font-weight="bold">ROLE_PERMISSIONS</text>
  <text x="410" y="90" fill="#c7d2fe" font-size="11" text-anchor="middle">permissions.js (단일 출처)</text>

  <!-- Roles row 1 -->
  <!-- developer -->
  <rect x="30" y="155" width="155" height="60" rx="8" fill="#7c3aed"/>
  <text x="108" y="175" fill="#fff" font-size="13" text-anchor="middle" font-weight="bold">👨‍💻 developer</text>
  <text x="108" y="192" fill="#ddd6fe" font-size="10" text-anchor="middle">level: 100</text>
  <text x="108" y="207" fill="#ddd6fe" font-size="10" text-anchor="middle">system.admin / code.deploy</text>

  <!-- master -->
  <rect x="210" y="155" width="155" height="60" rx="8" fill="#b45309"/>
  <text x="288" y="175" fill="#fff" font-size="13" text-anchor="middle" font-weight="bold">👑 master</text>
  <text x="288" y="192" fill="#fde68a" font-size="10" text-anchor="middle">level: 90</text>
  <text x="288" y="207" fill="#fde68a" font-size="10" text-anchor="middle">clan.admin / master.delegate</text>

  <!-- admin -->
  <rect x="390" y="155" width="155" height="60" rx="8" fill="#1d4ed8"/>
  <text x="468" y="175" fill="#fff" font-size="13" text-anchor="middle" font-weight="bold">🛡️ admin</text>
  <text x="468" y="192" fill="#bfdbfe" font-size="10" text-anchor="middle">level: 80</text>
  <text x="468" y="207" fill="#bfdbfe" font-size="10" text-anchor="middle">member.manage / ladder.moderate</text>

  <!-- elite -->
  <rect x="570" y="155" width="155" height="60" rx="8" fill="#0f766e"/>
  <text x="648" y="175" fill="#fff" font-size="13" text-anchor="middle" font-weight="bold">⭐ elite</text>
  <text x="648" y="192" fill="#99f6e4" font-size="10" text-anchor="middle">level: 60</text>
  <text x="648" y="207" fill="#99f6e4" font-size="10" text-anchor="middle">member.approve / match.host</text>

  <!-- Row 2 -->
  <!-- associate/member -->
  <rect x="120" y="285" width="175" height="60" rx="8" fill="#15803d"/>
  <text x="208" y="305" fill="#fff" font-size="12" text-anchor="middle" font-weight="bold">🛡️ associate/member</text>
  <text x="208" y="321" fill="#bbf7d0" font-size="10" text-anchor="middle">level: 50</text>
  <text x="208" y="336" fill="#bbf7d0" font-size="10" text-anchor="middle">ladder.play / community.post</text>

  <!-- rookie -->
  <rect x="325" y="285" width="155" height="60" rx="8" fill="#374151"/>
  <text x="403" y="305" fill="#fff" font-size="13" text-anchor="middle" font-weight="bold">🆕 rookie</text>
  <text x="403" y="321" fill="#d1d5db" font-size="10" text-anchor="middle">level: 35</text>
  <text x="403" y="336" fill="#fbbf24" font-size="10" text-anchor="middle">⚠️ Discord 연동 필수</text>

  <!-- applicant -->
  <rect x="510" y="285" width="155" height="60" rx="8" fill="#374151"/>
  <text x="588" y="305" fill="#fff" font-size="13" text-anchor="middle" font-weight="bold">📝 applicant</text>
  <text x="588" y="321" fill="#d1d5db" font-size="10" text-anchor="middle">level: 25</text>
  <text x="588" y="336" fill="#d1d5db" font-size="10" text-anchor="middle">application.track</text>

  <!-- visitor -->
  <rect x="300" y="415" width="155" height="60" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="378" y="435" fill="#94a3b8" font-size="13" text-anchor="middle" font-weight="bold">👤 visitor</text>
  <text x="378" y="451" fill="#64748b" font-size="10" text-anchor="middle">level: 10</text>
  <text x="378" y="466" fill="#64748b" font-size="10" text-anchor="middle">application.submit</text>

  <!-- Connector lines from root to row1 -->
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>
  <line x1="410" y1="99" x2="108" y2="155" stroke="#475569" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="410" y1="99" x2="288" y2="155" stroke="#475569" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="410" y1="99" x2="468" y2="155" stroke="#475569" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="410" y1="99" x2="648" y2="155" stroke="#475569" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Connectors to row 2 -->
  <line x1="468" y1="215" x2="280" y2="285" stroke="#475569" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="468" y1="215" x2="403" y2="285" stroke="#475569" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="468" y1="215" x2="525" y2="285" stroke="#475569" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Connector to visitor -->
  <line x1="403" y1="345" x2="378" y2="415" stroke="#475569" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Footer -->
  <text x="410" y="545" fill="#475569" font-size="11" text-anchor="middle">ByClan Web · Role Hierarchy · docs/diagram-gallery/role-hierarchy.svg</text>
</svg>
