<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ByClan Web — 인터랙티브 다이어그램</title>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <style>
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --border: #334155;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #6366f1;
      --accent-hover: #4f46e5;
      --success: #22c55e;
      --danger: #ef4444;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
    }
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    header h1 { font-size: 1.25rem; font-weight: 700; }
    header span { color: var(--muted); font-size: 0.875rem; }
    .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
    nav {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 2rem;
    }
    nav button {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.5rem 1rem;
      border-radius: 0.5rem;
      cursor: pointer;
      font-size: 0.875rem;
      transition: all 0.2s;
    }
    nav button:hover { border-color: var(--accent); color: var(--accent); }
    nav button.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .diagram-panel {
      display: none;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 0.75rem;
      padding: 1.5rem;
    }
    .diagram-panel.active { display: block; }
    .diagram-panel h2 {
      font-size: 1.125rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }
    .diagram-panel p {
      color: var(--muted);
      font-size: 0.875rem;
      margin-bottom: 1.5rem;
    }
    .mermaid {
      background: #1a1a2e;
      border-radius: 0.5rem;
      padding: 1rem;
      overflow-x: auto;
      text-align: center;
    }
    footer {
      text-align: center;
      color: var(--muted);
      font-size: 0.75rem;
      padding: 2rem;
      border-top: 1px solid var(--border);
      margin-top: 3rem;
    }
    footer a { color: var(--accent); text-decoration: none; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>📊 ByClan Web — 인터랙티브 다이어그램</h1>
      <span>Mermaid 기반 시각화 · 다크 테마</span>
    </div>
  </header>

  <div class="container">
    <nav id="nav"></nav>
    <div id="panels"></div>
  </div>

  <footer>
    <p>
      소스: <a href="https://github.com/gkfla0720a/byclan-web" target="_blank">gkfla0720a/byclan-web</a>
      &nbsp;|&nbsp;
      텍스트 버전: <a href="VISUAL-DIAGRAMS.md">VISUAL-DIAGRAMS.md</a>
    </p>
  </footer>

  <script>
    const diagrams = [
      {
        id: 'auth-flow',
        title: '1. 인증 흐름',
        description: '초기 진입부터 세션 수립, 권한 계산까지의 전체 인증 흐름입니다.',
        code: `flowchart TD
    A([🌐 브라우저 진입 /]) --> B{HomeGate\\n비밀번호 확인}
    B -- ❌ 미입력 --> C[비밀번호 입력 화면]
    C -- 올바른 비밀번호 --> D
    B -- ✅ 통과 --> D{로그인 여부 확인}
    D -- 미로그인 --> E[/login\\nImprovedAuthForm]
    E --> F[Discord OAuth 인증 화면]
    F --> G[/auth/callback\\nPKCE 코드 교환]
    G --> H[(Supabase\\n세션 생성)]
    D -- 이미 로그인 --> I
    H --> I[useAuth 초기화]
    I --> J[supabase.auth.getSession 호출]
    J --> K[(profiles 테이블 조회)]
    K -- 프로필 없음 --> L[visitor 프로필 자동 생성]
    K -- role = applicant --> M[가입 대기 화면 표시]
    K -- 정식 멤버 --> N[Discord 정보 자동 갱신]
    L --> O
    N --> O[getPermissions 권한 계산]
    O --> P[AuthContext 전체 앱 제공]
    P --> Q([✅ 페이지 렌더링 완료])`,
      },
      {
        id: 'role-state',
        title: '2. 역할 상태',
        description: '사용자 역할의 생명주기와 각 전환 조건입니다.',
        code: `stateDiagram-v2
    [*] --> visitor : 첫 방문
    visitor --> applicant : Discord 로그인 + 가입 신청
    applicant --> rookie : 운영진 승인
    applicant --> visitor : 가입 거절
    rookie --> associate : 정회원 전환 신청 + 승인
    rookie --> member : 정회원 전환 신청 + 승인
    associate --> elite : 활동 기여 + 운영진 승인
    member --> elite : 활동 기여 + 운영진 승인
    elite --> admin : master 이상 임명
    admin --> master : master 위임
    master --> admin : 강등
    admin --> elite : 강등
    elite --> associate : 강등`,
      },
      {
        id: 'sequence',
        title: '3. 컴포넌트 상호작용',
        description: '로그인부터 Header 렌더링까지의 컴포넌트 간 메시지 흐름입니다.',
        code: `sequenceDiagram
    actor 사용자
    participant Header as Header.js
    participant AuthCtx as AuthContext
    participant useAuth as useAuth.ts
    participant Supabase

    사용자->>Header: 로그인 버튼 클릭
    Header->>AuthCtx: useAuthContext() 호출
    AuthCtx->>useAuth: handleLogin() 실행
    useAuth->>Supabase: signInWithOAuth (Discord)
    Supabase-->>사용자: Discord OAuth 리다이렉트
    사용자->>Supabase: /auth/callback (인증 코드)
    Supabase-->>useAuth: 세션 생성 완료
    useAuth->>Supabase: profiles 테이블 조회
    Supabase-->>useAuth: 사용자 프로필 반환
    useAuth->>useAuth: getPermissions() 계산
    useAuth-->>AuthCtx: user, profile, permissions 제공
    AuthCtx-->>Header: useAuthContext() 값 업데이트
    Header->>Header: 역할별 메뉴 항목 렌더링`,
      },
      {
        id: 'permissions',
        title: '4. 권한 계층도',
        description: '각 역할의 레벨과 보유 권한을 계층 구조로 표시합니다.',
        code: `graph TD
    ROOT["🏛️ ROLE_PERMISSIONS\\n(permissions.js)"]
    ROOT --> DEV["👨‍💻 developer (100)\\nsystem.admin / database.modify\\ncode.deploy / user.manage_all"]
    ROOT --> MASTER["👑 master (90)\\nclan.admin / master.delegate\\ntournament.create / ladder.admin"]
    ROOT --> ADMIN["🛡️ admin (80)\\nmember.approve / member.manage\\nmatch.manage / ladder.moderate"]
    ROOT --> ELITE["⭐ elite (60)\\nmember.approve / match.host\\ntournament.join / member.mentor"]
    ROOT --> ASSOC["🛡️ associate / member (50)\\nmatch.join / ladder.play\\ncommunity.post / profile.edit"]
    ROOT --> ROOKIE["🆕 rookie (35)\\nmatch.view / community.view\\nladder.play (Discord 필수)"]
    ROOT --> APPL["📝 applicant (25)\\nmatch.view / community.view\\napplication.track"]
    ROOT --> VISIT["👤 visitor (10)\\nmatch.view / community.view(제한)\\napplication.submit"]`,
      },
      {
        id: 'call-graph',
        title: '5. 함수 호출 계층',
        description: 'Header.js에서 시작하는 핵심 함수 호출 흐름입니다.',
        code: `flowchart TD
    HEADER["Header.js"] --> UAC["useAuthContext()"]
    UAC --> USER["user (로그인 상태)"]
    UAC --> PROFILE["profile (역할·포인트)"]
    UAC --> GP["getPermissions()"]
    GP --> HASPERM["PermissionChecker.hasPermission()"]
    GP --> HASLEVEL["PermissionChecker.hasLevel()"]
    GP --> ISINGROUP["PermissionChecker.isInGroup()"]
    GP --> CANMENU["PermissionChecker.canAccessMenu()"]
    GP --> BYPASS["shouldBypassDiscordForTestAccount()"]
    GP --> DEVSET["loadDevSettings()"]
    HASPERM --> ROLEPERMS["ROLE_PERMISSIONS\\n(단일 출처)"]
    HASLEVEL --> ROLEPERMS
    ISINGROUP --> ROLEPERMS
    CANMENU --> ROLEPERMS
    HEADER --> MENUCOND["역할별 메뉴 조건"]
    MENUCOND --> ISDEV["isDeveloper → 개발자 콘솔"]
    MENUCOND --> ELTHIGH["isEliteOrHigher → 가입 심사"]
    MENUCOND --> ADMHIGH["isAdminOrHigher → 관리자 메뉴"]`,
      },
      {
        id: 'er-diagram',
        title: '6. 데이터 레이어 관계도',
        description: 'Supabase 테이블 간의 관계를 ER 다이어그램으로 표시합니다.',
        code: `erDiagram
    AUTH_USERS {
        uuid id PK
        string email
        string provider
    }
    PROFILES {
        uuid id PK_FK
        string ByID
        string role
        string discord_id
        int ladder_points
        bool is_in_queue
        int points
    }
    LADDER_MATCHES {
        uuid id PK
        string status
        string match_type
        uuid created_by FK
    }
    NOTIFICATIONS {
        uuid id PK
        uuid user_id FK
        bool is_read
    }
    APPLICATIONS {
        uuid id PK
        uuid user_id FK
        string status
    }
    AUTH_USERS ||--|| PROFILES : "1:1"
    PROFILES ||--o{ LADDER_MATCHES : "1:N"
    PROFILES ||--o{ NOTIFICATIONS : "1:N"
    PROFILES ||--o{ APPLICATIONS : "1:N"`,
      },
      {
        id: 'permission-flow',
        title: '7. 권한 검증 플로우',
        description: 'PermissionChecker.hasPermission() 내부 검증 로직 흐름입니다.',
        code: `flowchart TD
    START(["hasPermission(role, permission)"])
    START --> R1{role이 유효한가?}
    R1 -- 없음 --> DENY1(["❌ false"])
    R1 -- 있음 --> R2{ROLE_PERMISSIONS에\\n역할 존재?}
    R2 -- 없음 --> DENY2(["❌ false"])
    R2 -- 있음 --> R3{role === developer?}
    R3 -- Yes --> R4{DEV_SETTINGS\\n제한 확인}
    R4 -- 제한 설정됨 --> DENY3(["❌ false"])
    R4 -- 제한 없음 --> ALLOW1(["✅ true (전체 권한)"])
    R3 -- No --> R5{permissions 배열에\\npermission 포함?}
    R5 -- Yes --> ALLOW2(["✅ true"])
    R5 -- No --> DENY4(["❌ false"])`,
      },
      {
        id: 'routing',
        title: '8. 라우팅 트리',
        description: 'Next.js App Router 기반의 전체 라우팅 구조입니다.',
        code: `graph TD
    ROOT["/\\n홈 (HomeGate)"]
    ROOT --> LOGIN["/login"]
    ROOT --> CALLBACK["/auth/callback"]
    ROOT --> MAIN["/(main)\\nHeader + Footer + HomeGate"]
    MAIN --> SIDEBAR["/(sidebar)\\nProfileSidebar"]
    MAIN --> ADMIN["/admin"]
    MAIN --> PROFILE["/profile"]
    MAIN --> NOTIF["/notifications"]
    MAIN --> DEV["/developer"]
    SIDEBAR --> OV["/overview"]
    SIDEBAR --> MEM["/members"]
    SIDEBAR --> LADDER["/ladder"]
    SIDEBAR --> RANK["/ranking"]
    SIDEBAR --> NOTICE["/notice"]
    SIDEBAR --> COMM["/community"]
    SIDEBAR --> MEDIA["/media"]
    SIDEBAR --> TOUR["/tournament"]
    SIDEBAR --> JOIN["/join"]
    SIDEBAR --> MATCH["/matches"]
    SIDEBAR --> POINTS["/points"]
    ADMIN --> APPS["/admin/applications"]
    ADMIN --> GUILD["/admin/guild"]
    JOIN --> TRANSFER["/join/transfer"]`,
      },
    ];

    mermaid.initialize({
      startOnLoad: false,
      theme: 'dark',
      themeVariables: {
        darkMode: true,
        background: '#1a1a2e',
        primaryColor: '#6366f1',
        primaryTextColor: '#e2e8f0',
        primaryBorderColor: '#4f46e5',
        lineColor: '#94a3b8',
        secondaryColor: '#1e293b',
        tertiaryColor: '#0f172a',
      },
    });

    const nav = document.getElementById('nav');
    const panels = document.getElementById('panels');

    diagrams.forEach((d, i) => {
      // Nav button
      const btn = document.createElement('button');
      btn.textContent = d.title;
      btn.dataset.id = d.id;
      if (i === 0) btn.classList.add('active');
      btn.addEventListener('click', () => {
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.diagram-panel').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(`panel-${d.id}`).classList.add('active');
      });
      nav.appendChild(btn);

      // Panel
      const panel = document.createElement('div');
      panel.className = 'diagram-panel' + (i === 0 ? ' active' : '');
      panel.id = `panel-${d.id}`;
      panel.innerHTML = `
        <h2>${d.title}</h2>
        <p>${d.description}</p>
        <div class="mermaid">${d.code}</div>
      `;
      panels.appendChild(panel);
    });

    mermaid.run();
  </script>
</body>
</html>
